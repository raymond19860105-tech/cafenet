    function escapeHtml(value) {

      if (metric.type === "approved") return list.filter((item) => item.status === "已通過").length;
      if (metric.type === "amount") return formatMoney(list.reduce((sum, item) => sum + Number(item.amount || 0), 0));
      if (metric.type === "pendingAmount") return formatMoney(list.filter((item) => item.status === "待審批").reduce((sum, item) => sum + Number(item.amount || 0), 0));
      if (metric.type === "usedToday") return formatMoney(list.reduce((sum, item) => sum + Number(item.usedToday || 0), 0));
      if (metric.type === "dailyLimit") return formatMoney(list.reduce((sum, item) => sum + Number(item.dailyLimit || 0), 0));
      if (metric.type === "deposit") return formatMoney(list.reduce((sum, item) => sum + Number(item.deposit || 0), 0));
      if (metric.type === "withdraw") return formatMoney(list.reduce((sum, item) => sum + Number(item.withdraw || 0), 0));
      if (metric.type === "net") return formatMoney(list.reduce((sum, item) => sum + Number(item.net || 0), 0));
      if (metric.type === "validBet") return formatMoney(list.reduce((sum, item) => sum + Number(item.validBet || 0), 0));
      if (metric.type === "ggr") return formatMoney(list.reduce((sum, item) => sum + Number(item.ggr || 0), 0));
      if (metric.type === "profit") return formatMoney(list.reduce((sum, item) => sum + Number(item.profit || 0), 0));
      return "-";
    }

    function renderMetrics() {
      document.getElementById("metrics").innerHTML = config.metrics.map((metric) => '<div class="metric">' + escapeHtml(metric.label) + '<strong>' + escapeHtml(metricValue(metric)) + '</strong></div>').join("");
    }

    function renderPrimaryActions() {
      const actions = [];
      if (config.primaryAction) actions.push('<button class="button primary" type="button" data-create>' + escapeHtml(config.primaryAction) + '</button>');
      if (config.exportAction) actions.push('<button class="button primary" type="button" data-export>匯出報表</button>');
      document.getElementById("primaryActions").innerHTML = actions.join("");
    }

    function renderBulkActions() {
      const el = document.getElementById("bulkActions");
      if (!config.selectable) {
        el.innerHTML = '<span class="selected-count">合計 <strong id="tableTotal">' + filteredRecords.length + '</strong> 件</span>';
        return;
      }
      el.innerHTML = '<span class="selected-count">已選 <strong id="selectedCount">0</strong></span>' + (config.bulkActions || []).map((action) => '<button class="button" type="button" data-bulk="' + action.action + '" disabled>' + escapeHtml(action.label) + '</button>').join("");
    }

    function copyMarkup(value) {
      return '<span class="copy-cell"><span class="copy-text" title="' + escapeHtml(value) + '">' + escapeHtml(value) + '</span><button class="copy-button" type="button" data-copy="' + escapeHtml(value) + '" aria-label="複製 ' + escapeHtml(value) + '"><svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button></span>';
    }

    function cellMarkup(record, column) {
      const value = record[column.key];
      if (column.type === "copy") return copyMarkup(value);
      if (column.type === "status") return '<span class="tag ' + tagClass(value) + '">' + escapeHtml(value) + '</span>';
      if (column.type === "tag") return '<span class="tag">' + escapeHtml(value) + '</span>';
      if (column.primary) return '<span class="primary-cell">' + escapeHtml(value) + '<span class="subline">' + escapeHtml(record.id || record.account || "") + '</span></span>';
      return formatValue(value, column.type);
    }

    function rowActions(record) {
      const buttons = ['<button class="button" type="button" data-detail="' + escapeHtml(record.id) + '">詳情</button>'];
      if (["merchant", "auto"].includes(PAGE_KEY)) buttons.unshift('<button class="button" type="button" data-edit="' + escapeHtml(record.id) + '">編輯</button>');
      if (PAGE_KEY === "wallet") {
        buttons.unshift('<button class="button primary" type="button" data-transfer="deposit" data-id="' + escapeHtml(record.id) + '">系統上分</button>');
        buttons.push('<button class="button" type="button" data-transfer="withdraw" data-id="' + escapeHtml(record.id) + '">系統下分</button>');
      }
      if (PAGE_KEY === "request" && record.status === "待審批") buttons.push('<button class="button danger" type="button" data-cancel="' + escapeHtml(record.id) + '">取消</button>');
      if (PAGE_KEY === "approval" && record.status === "待審批") {
        buttons.unshift('<button class="button primary" type="button" data-review="approve" data-id="' + escapeHtml(record.id) + '">通過</button>');
        buttons.push('<button class="button danger" type="button" data-review="reject" data-id="' + escapeHtml(record.id) + '">拒絕</button>');
      }
      if (PAGE_KEY === "auto") buttons.push('<button class="button" type="button" data-toggle="' + escapeHtml(record.id) + '">' + (record.status === "啟用" ? "停用" : "啟用") + '</button>');
      return '<div class="row-actions">' + buttons.join("") + '</div>';
    }

    function renderRows() {
      headEl.innerHTML = (config.selectable ? '<th class="check-col"><input id="selectAll" type="checkbox" aria-label="全選"></th>' : "") + config.columns.map((column) => '<th>' + escapeHtml(column.label) + '</th>').join("") + '<th>操作</th>';
      rowsEl.innerHTML = filteredRecords.map((record) => '<tr>' + (config.selectable ? '<td class="check-col"><input class="row-check" type="checkbox" data-id="' + escapeHtml(record.id) + '" ' + (selectedIds.has(record.id) ? "checked" : "") + '></td>' : "") + config.columns.map((column) => '<td>' + cellMarkup(record, column) + '</td>').join("") + '<td>' + rowActions(record) + '</td></tr>').join("");
      cardListEl.innerHTML = filteredRecords.map((record) => '<article class="data-card"><div class="card-head"><div class="card-title"><strong>' + escapeHtml(record.account || record.id) + '</strong><span class="subline">' + escapeHtml(record.name || config.title) + '</span></div>' + (record.status ? '<span class="tag ' + tagClass(record.status) + '">' + escapeHtml(record.status) + '</span>' : "") + '</div><div class="card-meta">' + config.columns.slice(0, 6).map((column) => '<div class="card-meta-item"><span>' + escapeHtml(column.label) + '</span><strong>' + (column.type === "copy" ? escapeHtml(record[column.key]) : cellMarkup(record, column)) + '</strong></div>').join("") + '</div>' + rowActions(record) + '</article>').join("");
      emptyStateEl.style.display = filteredRecords.length ? "none" : "block";
      updateSelectionState();
    }

    function renderChips(filters) {
      const active = Object.entries(filters).filter(([, value]) => value !== "");
      filterCountEl.textContent = active.length;
      chipsEl.innerHTML = active.length ? active.map(([key, value]) => {
        const field = config.filters.find((item) => item.key === key);
        return '<span class="chip"><span>' + escapeHtml((field ? field.label : key) + "：" + value) + '</span><button type="button" data-remove-filter="' + escapeHtml(key) + '">×</button></span>';
      }).join("") : '<span class="empty-chip">無套用條件</span>';
    }

    function applyFilters() {
      const filters = Object.fromEntries(new FormData(form).entries());
      filteredRecords = records.filter((record) => matchesFilter(record, filters)).sort((a, b) => String(a.updatedAt || a.createdAt || a.date || "").localeCompare(String(b.updatedAt || b.createdAt || b.date || "")) * (sortDescending ? -1 : 1));
      selectedIds = new Set(Array.from(selectedIds).filter((id) => filteredRecords.some((item) => item.id === id)));
      resultCountEl.textContent = filteredRecords.length;
      const total = document.getElementById("tableTotal");
      if (total) total.textContent = filteredRecords.length;
      renderChips(filters);
      renderMetrics();
      renderRows();
    }

    function resetFilters() {
      form.reset();
      applyFilters();
    }

    function updateSelectionState() {
      if (!config.selectable) return;
      const selectedCount = document.getElementById("selectedCount");
      if (selectedCount) selectedCount.textContent = selectedIds.size;
      document.querySelectorAll("[data-bulk]").forEach((button) => button.disabled = selectedIds.size === 0);
      const selectAll = document.getElementById("selectAll");
      if (!selectAll) return;
      const visibleIds = filteredRecords.map((item) => item.id);
      const visibleSelected = visibleIds.filter((id) => selectedIds.has(id)).length;
      selectAll.checked = visibleIds.length > 0 && visibleSelected === visibleIds.length;
      selectAll.indeterminate = visibleSelected > 0 && visibleSelected < visibleIds.length;
    }

    function detailItems(record) {
      return Object.entries(record).map(([key, value]) => '<div class="detail-item"><span>' + escapeHtml(key) + '</span><strong>' + escapeHtml(value) + '</strong></div>').join("");
    }

    function openDetail(id) {
      const record = records.find((item) => item.id === id);
      if (!record) return;
      drawerTitleEl.textContent = record.account || record.id;
      drawerSubEl.textContent = config.title + "｜" + (record.name || record.status || "-");
      drawerBodyEl.innerHTML = '<div class="detail-grid">' + detailItems(record) + '</div>';
      drawerEl.classList.add("is-open");
      drawerBackdropEl.classList.add("is-open");
      drawerEl.setAttribute("aria-hidden", "false");
    }

    function closeDrawer() {
      drawerEl.classList.remove("is-open");
      drawerBackdropEl.classList.remove("is-open");
      drawerEl.setAttribute("aria-hidden", "true");
    }

    function modalFormFields(record) {
      return (config.formFields || []).map((field) => {
        const value = record ? record[field.key] || "" : "";
        if (field.type === "select") return '<div class="field"><label>' + escapeHtml((field.required ? "* " : "") + field.label) + '</label><select name="' + escapeHtml(field.key) + '">' + (field.options || []).map((option) => '<option value="' + escapeHtml(option) + '" ' + (option === value ? "selected" : "") + '>' + escapeHtml(option) + '</option>').join("") + '</select></div>';
        if (field.type === "textarea") return '<div class="field"><label>' + escapeHtml((field.required ? "* " : "") + field.label) + '</label><textarea name="' + escapeHtml(field.key) + '">' + escapeHtml(value) + '</textarea></div>';
        return '<div class="field"><label>' + escapeHtml((field.required ? "* " : "") + field.label) + '</label><input name="' + escapeHtml(field.key) + '" type="' + (field.type === "number" ? "number" : "text") + '" value="' + escapeHtml(value) + '"></div>';
      }).join("");
    }

    function openForm(mode, id) {
      const record = id ? records.find((item) => item.id === id) : null;
      modalTitleEl.textContent = (mode === "edit" ? "編輯" : "新增") + config.entity;
      modalBodyEl.innerHTML = '<form id="entityForm" data-mode="' + mode + '" data-id="' + escapeHtml(id || "") + '"><div class="edit-grid">' + modalFormFields(record) + '</div><div class="modal-footer"><button class="button" type="button" data-close-modal>取消</button><button class="button primary" type="submit">儲存</button></div></form>';
      openModal();
    }

    function nextId(prefix) {
      return prefix + "-" + String(Date.now()).slice(-6);
    }

    function saveForm(formEl) {
      const mode = formEl.dataset.mode;
      const id = formEl.dataset.id;
      const values = Object.fromEntries(new FormData(formEl).entries());
      for (const field of config.formFields || []) {
        if (field.required && !String(values[field.key] || "").trim()) {
          showToast("請填寫" + field.label, "warning");
          return;
        }
      }
      let record = id ? records.find((item) => item.id === id) : null;
      if (!record) {
        const prefix = PAGE_KEY === "merchant" ? "AG" : PAGE_KEY === "request" ? "TOP" : "AUTO";
        record = { id: nextId(prefix), createdAt: now(), updatedAt: now(), status: PAGE_KEY === "request" ? "待審批" : "啟用", members: 0, balance: 0, usedToday: 0 };
        records.unshift(record);
      }
      Object.entries(values).forEach(([key, value]) => {
        const field = (config.formFields || []).find((item) => item.key === key);
        record[key] = field && field.type === "number" ? Number(value || 0) : value;
      });
      if (PAGE_KEY === "request") {
        record.applicant = "pl_raymond";
        record.reviewer = "-";
      }
      record.updatedAt = now();
      closeModal();
      applyFilters();
      showToast(mode === "edit" ? config.entity + "已儲存" : config.entity + "已新增");
    }

    function openTransfer(id, mode, batch) {
      const targets = batch ? records.filter((item) => selectedIds.has(item.id)) : records.filter((item) => item.id === id);
      if (!targets.length) {
        showToast("請先勾選要處理的錢包", "warning");
        return;
      }
      modalTitleEl.textContent = (batch ? "批次" : "") + (mode === "deposit" ? "系統上分" : "系統下分");
      modalBodyEl.innerHTML = '<form id="transferForm" data-mode="' + mode + '" data-batch="' + (batch ? "true" : "false") + '" data-id="' + escapeHtml(id || "") + '"><div class="field"><label>處理對象</label><input readonly value="' + escapeHtml(batch ? targets.length + " 個錢包" : targets[0].account + "(" + targets[0].currency + ")") + '"></div><div class="field"><label>* 額度</label><input name="amount" type="number" min="0" required></div><div class="filter-actions">' + [100,500,1000,5000].map((amount) => '<button class="button" type="button" data-preset="' + amount + '">+' + amount + '</button>').join("") + '</div><div class="field"><label>* 備註</label><textarea name="remark" required></textarea></div><div class="modal-footer"><button class="button" type="button" data-close-modal>取消</button><button class="button primary" type="submit">保存</button></div></form>';
      openModal();
    }

    function saveTransfer(formEl) {
      const amount = Number(formEl.elements.amount.value || 0);
      const remark = formEl.elements.remark.value.trim();
      const targets = formEl.dataset.batch === "true" ? records.filter((item) => selectedIds.has(item.id)) : records.filter((item) => item.id === formEl.dataset.id);
      if (!amount || amount <= 0) return showToast("請輸入有效額度", "warning");
      if (!remark) return showToast("請填寫備註", "warning");
      if (formEl.dataset.mode === "withdraw" && targets.some((item) => amount > Number(item.balance || 0))) return showToast("下分金額不可大於目前餘額", "warning");
      targets.forEach((item) => {
        item.balance = formEl.dataset.mode === "deposit" ? Number(item.balance || 0) + amount : Number(item.balance || 0) - amount;
        item.available = Math.max(0, Number(item.balance || 0) - Number(item.frozen || 0));
        if (formEl.dataset.mode === "deposit") item.todayDeposit = Number(item.todayDeposit || 0) + amount;
        if (formEl.dataset.mode === "withdraw") item.todayWithdraw = Number(item.todayWithdraw || 0) + amount;
        item.updatedAt = now();
      });
      closeModal();
      applyFilters();
      showToast((formEl.dataset.mode === "deposit" ? "上分" : "下分") + "成功，已處理 " + targets.length + " 筆");
    }

    function openReview(id, decision, batch) {
      const targets = batch ? records.filter((item) => selectedIds.has(item.id) && item.status === "待審批") : records.filter((item) => item.id === id);
      if (!targets.length) return showToast("沒有待審批資料", "warning");
      modalTitleEl.textContent = (decision === "approve" ? "通過" : "拒絕") + "上分請求";
      modalBodyEl.innerHTML = '<form id="reviewForm" data-decision="' + decision + '" data-batch="' + (batch ? "true" : "false") + '" data-id="' + escapeHtml(id || "") + '"><div class="field"><label>審批對象</label><input readonly value="' + escapeHtml(targets.length + " 筆，合計 " + formatMoney(targets.reduce((sum, item) => sum + Number(item.amount || 0), 0))) + '"></div><div class="field"><label>審批備註</label><textarea name="remark"></textarea></div><div class="modal-footer"><button class="button" type="button" data-close-modal>取消</button><button class="button primary" type="submit">確認</button></div></form>';
      openModal();
    }

    function saveReview(formEl) {
      const targets = formEl.dataset.batch === "true" ? records.filter((item) => selectedIds.has(item.id) && item.status === "待審批") : records.filter((item) => item.id === formEl.dataset.id);
      const status = formEl.dataset.decision === "approve" ? "已通過" : "已拒絕";
      targets.forEach((item) => {
        item.status = status;
        item.reviewer = "pl_raymond";
        item.reviewRemark = formEl.elements.remark.value.trim() || "-";
        item.updatedAt = now();
      });
      closeModal();
      applyFilters();
      showToast("已" + (status === "已通過" ? "通過" : "拒絕") + " " + targets.length + " 筆請求");
    }

    function applyBulk(action) {
      if (["batchDeposit", "batchWithdraw"].includes(action)) return openTransfer("", action === "batchDeposit" ? "deposit" : "withdraw", true);
      if (["batchApprove", "batchReject"].includes(action)) return openReview("", action === "batchApprove" ? "approve" : "reject", true);
      const targets = records.filter((item) => selectedIds.has(item.id));
      if (!targets.length) return showToast("請先勾選資料", "warning");
      targets.forEach((item) => {
        if (action === "enable") item.status = "啟用";
        if (action === "disable") item.status = "停用";
        if (action === "cancel" && item.status === "待審批") item.status = "已取消";
        item.updatedAt = now();
      });
      applyFilters();
      showToast("批次操作已完成，共 " + targets.length + " 筆");
    }

    async function copyValue(value, button) {
      try {
        if (navigator.clipboard && window.isSecureContext) await navigator.clipboard.writeText(value);
        else {
          const helper = document.createElement("textarea");
          helper.value = value;
          helper.style.position = "fixed";
          helper.style.opacity = "0";
          document.body.appendChild(helper);
          helper.select();
          document.execCommand("copy");
          helper.remove();
        }
        button.classList.add("copied");
        showToast("已複製");
        setTimeout(() => button.classList.remove("copied"), 1200);
      } catch (error) {
        showToast("複製失敗，請手動選取", "danger");
      }
    }

    function openModal() {
      modalEl.classList.add("is-open");
      modalBackdropEl.classList.add("is-open");
      modalEl.setAttribute("aria-hidden", "false");
    }

    function closeModal() {
      modalEl.classList.remove("is-open");
      modalBackdropEl.classList.remove("is-open");
      modalEl.setAttribute("aria-hidden", "true");
    }

    renderFilters();
    renderPrimaryActions();
    renderBulkActions();
    applyFilters();

    form.addEventListener("submit", (event) => { event.preventDefault(); applyFilters(); });
    document.getElementById("resetFilters").addEventListener("click", resetFilters);
    document.getElementById("clearApplied").addEventListener("click", resetFilters);
    document.getElementById("refreshButton").addEventListener("click", () => { applyFilters(); showToast("資料已刷新"); });
    document.getElementById("toggleFilters").addEventListener("click", (event) => {
      const panel = document.getElementById("filterPanel");
      panel.hidden = !panel.hidden;
      event.currentTarget.setAttribute("aria-expanded", String(!panel.hidden));
    });
    document.getElementById("moreToggle").addEventListener("click", (event) => {
      const panel = document.getElementById("moreFilters");
      panel.hidden = !panel.hidden;
      event.currentTarget.setAttribute("aria-expanded", String(!panel.hidden));
    });
    document.getElementById("sortUpdated").addEventListener("click", () => {
      sortDescending = !sortDescending;
      applyFilters();
      showToast(sortDescending ? "已依時間由新到舊排序" : "已依時間由舊到新排序");
    });
    chipsEl.addEventListener("click", (event) => {
      const button = event.target.closest("[data-remove-filter]");
      if (!button) return;
      const control = form.elements[button.dataset.removeFilter];
      if (control) control.value = "";
      applyFilters();
    });
    document.body.addEventListener("click", (event) => {
      const create = event.target.closest("[data-create]");
      if (create) return openForm("create");
      const exportButton = event.target.closest("[data-export]");
      if (exportButton) return showToast(config.title + "已產生匯出檔案");
      const bulk = event.target.closest("[data-bulk]");
      if (bulk) return applyBulk(bulk.dataset.bulk);
      const copy = event.target.closest("[data-copy]");
      if (copy) return copyValue(copy.dataset.copy, copy);
      const detail = event.target.closest("[data-detail]");
      if (detail) return openDetail(detail.dataset.detail);
      const edit = event.target.closest("[data-edit]");
      if (edit) return openForm("edit", edit.dataset.edit);
      const transfer = event.target.closest("[data-transfer]");
      if (transfer) return openTransfer(transfer.dataset.id, transfer.dataset.transfer, false);
      const review = event.target.closest("[data-review]");
      if (review) return openReview(review.dataset.id, review.dataset.review, false);
      const cancel = event.target.closest("[data-cancel]");
      if (cancel) {
        const record = records.find((item) => item.id === cancel.dataset.cancel);
        if (record && record.status === "待審批") {
          record.status = "已取消";
          record.updatedAt = now();
          applyFilters();
          showToast("請求已取消");
        }
        return;
      }
      const toggle = event.target.closest("[data-toggle]");
      if (toggle) {
        const record = records.find((item) => item.id === toggle.dataset.toggle);
        if (record) {
          record.status = record.status === "啟用" ? "停用" : "啟用";
          record.updatedAt = now();
          applyFilters();
          showToast("規則狀態已更新");
        }
        return;
      }
      const coming = event.target.closest("[data-coming-soon]");
      if (coming) showToast(coming.dataset.comingSoon + " 尚未建立頁面", "warning");
    });
    document.body.addEventListener("change", (event) => {
      const checkbox = event.target.closest(".row-check");
      if (!checkbox) return;
      if (checkbox.checked) selectedIds.add(checkbox.dataset.id);
      else selectedIds.delete(checkbox.dataset.id);
      updateSelectionState();
    });
    document.body.addEventListener("change", (event) => {
      if (event.target.id !== "selectAll") return;
      const visibleIds = filteredRecords.map((item) => item.id);
      if (event.target.checked) visibleIds.forEach((id) => selectedIds.add(id));
      else visibleIds.forEach((id) => selectedIds.delete(id));
      renderRows();
    });
    modalBodyEl.addEventListener("click", (event) => {
      if (event.target.closest("[data-close-modal]")) closeModal();
      const preset = event.target.closest("[data-preset]");
      if (preset) {
        const input = modalBodyEl.querySelector("input[name=amount]");
        if (input) input.value = String((Number(input.value) || 0) + Number(preset.dataset.preset));
      }
    });
    modalBodyEl.addEventListener("submit", (event) => {
      event.preventDefault();
      if (event.target.id === "entityForm") saveForm(event.target);
      if (event.target.id === "transferForm") saveTransfer(event.target);
      if (event.target.id === "reviewForm") saveReview(event.target);
    });
    document.getElementById("closeDrawer").addEventListener("click", closeDrawer);
    drawerBackdropEl.addEventListener("click", closeDrawer);
    document.getElementById("closeModal").addEventListener("click", closeModal);
    modalBackdropEl.addEventListener("click", closeModal);
    window.addEventListener("keydown", (event) => { if (event.key === "Escape") { closeDrawer(); closeModal(); } });
    function setupSidebarInteractions() {
      const menuToggleEl = document.querySelector(".menu-toggle");
      const sidebarEl = document.querySelector(".sidebar");
      const shellEl = document.querySelector(".app-shell");
      if (!menuToggleEl || !sidebarEl || !shellEl) return;

      const desktopQuery = window.matchMedia("(min-width: 821px)");

      function getMenuChevron(button) {
        const candidates = Array.from(button.children).filter((child) => !child.classList.contains("menu-label") && !child.classList.contains("menu-badge"));
        return candidates[candidates.length - 1] || null;
      }

      function setMenuExpanded(button, submenu, expanded) {
        submenu.hidden = !expanded;
        button.setAttribute("aria-expanded", String(expanded));
        const chevron = getMenuChevron(button);
        if (chevron) chevron.textContent = expanded ? "⌃" : "⌄";
      }

      sidebarEl.querySelectorAll(".sidebar-menu > .menu-item").forEach((button, index) => {
        const submenu = button.nextElementSibling && button.nextElementSibling.classList.contains("submenu") ? button.nextElementSibling : null;
        if (!submenu) {
          button.removeAttribute("aria-expanded");
          button.classList.add("is-empty");
          const chevron = getMenuChevron(button);
          if (chevron) chevron.textContent = "";
          button.addEventListener("click", () => {
            if (typeof showToast === "function") showToast("此分類尚未建立子選單", "warning");
          });
          return;
        }
        if (!submenu.id) submenu.id = "sidebar-submenu-" + index;
        button.setAttribute("aria-controls", submenu.id);
        setMenuExpanded(button, submenu, Boolean(submenu.querySelector(".submenu-item.active")));
        button.addEventListener("click", () => {
          setMenuExpanded(button, submenu, button.getAttribute("aria-expanded") !== "true");
        });
      });

      function setSidebarExpanded(expanded) {
        shellEl.classList.toggle("sidebar-collapsed", !expanded);
        sidebarEl.classList.remove("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", String(expanded));
      }

      function syncToggleState() {
        if (desktopQuery.matches) {
          menuToggleEl.setAttribute("aria-expanded", String(!shellEl.classList.contains("sidebar-collapsed")));
        } else {
          shellEl.classList.remove("sidebar-collapsed");
          menuToggleEl.setAttribute("aria-expanded", String(sidebarEl.classList.contains("is-mobile-open")));
        }
      }

      menuToggleEl.addEventListener("click", () => {
        if (desktopQuery.matches) {
          setSidebarExpanded(shellEl.classList.contains("sidebar-collapsed"));
          return;
        }
        const isOpen = sidebarEl.classList.toggle("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", String(isOpen));
      });

      sidebarEl.addEventListener("click", (event) => {
        const link = event.target.closest("a.submenu-item");
        if (!link || desktopQuery.matches) return;
        sidebarEl.classList.remove("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", "false");
      });

      if (desktopQuery.addEventListener) desktopQuery.addEventListener("change", syncToggleState);
      else desktopQuery.addListener(syncToggleState);
      syncToggleState();
    }

    setupSidebarInteractions();
  </script>
</body>
</html>
