    function escapeHtml(value) { return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function showToast(message, tone = "success") { const toast = document.getElementById("toast"); toast.textContent = message; toast.style.background = tone === "warning" ? "#92400e" : "#1f2937"; toast.classList.add("is-open"); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toast.classList.remove("is-open"), 1800); }
    function copyMarkup(text) { return '<span class="copy-line"><button class="copy-button" type="button" data-copy="' + escapeHtml(text) + '" aria-label="複製"></button><span>' + escapeHtml(text) + '</span></span>'; }
    function identityMarkup(item) { return '<div class="identity-stack"><span class="identity-name">' + escapeHtml(item.name) + '</span>' + copyMarkup(item.id) + '</div>'; }
    function agentLimitMarkup(item) { return '<div class="meta-stack"><span><span class="meta-label">代理</span>' + escapeHtml(item.agent) + '</span><span><span class="meta-label">ZF</span>' + escapeHtml(item.limit) + '</span></div>'; }
    function metaMarkup(vendorStatus, vendorType) { return '<div class="meta-stack"><span><span class="meta-label">狀</span>' + escapeHtml(vendorStatus) + '</span><span><span class="meta-label">類</span>' + escapeHtml(vendorType) + '</span></div>'; }
    function statusSortMarkup(item) { return '<div class="meta-stack status-stack"><span><label class="switch"><input type="checkbox" data-status="' + escapeHtml(item.integrationId) + '" ' + (item.enabled ? 'checked' : '') + '><span></span></label></span><span><span class="meta-label">排序</span>' + escapeHtml(item.sort) + '</span></div>'; }
    function timeMarkup(createdAt, updatedAt) { return '<div class="time-stack"><span><span class="time-label">建</span>' + escapeHtml(createdAt) + '</span><span><span class="time-label">更</span>' + escapeHtml(updatedAt) + '</span></div>'; }
    function fillOptions() { [...new Set(accessRows.map((item) => item.name))].sort().forEach((name) => vendorFilter.insertAdjacentHTML("beforeend", '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>')); }
    function renderRows() {
      rowsEl.innerHTML = filteredRows.map((item, index) => '<tr class="' + (index === 3 ? 'is-selected' : '') + '">' +
        '<td>' + identityMarkup(item) + '</td>' +
        '<td>' + agentLimitMarkup(item) + '</td>' +
        '<td>' + metaMarkup(item.vendorStatus, item.vendorType) + '</td>' +
        '<td>' + statusSortMarkup(item) + '</td>' +
        '<td class="remark-col">' + escapeHtml(item.remark) + '</td>' +
        '<td>' + timeMarkup(item.createdAt, item.updatedAt) + '</td>' +
        '<td><div class="row-actions compact-actions"><button class="button" type="button" data-view="' + escapeHtml(item.integrationId) + '">查看</button><button class="button" type="button" data-edit="' + escapeHtml(item.integrationId) + '">編輯</button></div></td></tr>').join("");
    }
    function applyFilters() {
      const vendor = vendorFilter.value;
      const status = statusFilter.value;
      const type = typeFilter.value;
      filteredRows = accessRows.filter((item) => (!vendor || item.name === vendor) && (!type || String(item.vendorType) === type) && (!status || (item.enabled ? "啟用" : "停用") === status));
      renderRows();
    }
    function row(label, control) { return '<div class="form-row"><label>' + label + '</label>' + control + '</div>'; }
    function input(name, value, readonly = false) { return '<input name="' + name + '" value="' + escapeHtml(value) + '" ' + (readonly ? 'readonly class="readonly"' : '') + '>'; }
    function openModal(id, mode = "view") {
      const item = accessRows.find((row) => row.integrationId === id);
      if (!item) return;
      currentId = id; currentMode = mode;
      modalTitleEl.textContent = mode === "view" ? "詳細" : "編輯";
      modeSwitchEl.textContent = mode === "view" ? "編輯" : "查看";
      modalFooterEl.hidden = mode === "view";
      const readonly = mode === "view";
      const statusText = item.enabled ? "啟用" : "停用";
      if (readonly) {
        modalBodyEl.innerHTML = '<div class="form-rows">' +
          row("ID", input("integrationId", item.integrationId, true)) +
          row("遊戲商ID", input("vendorId", item.id, true)) +
          row("遊戲商名稱", input("name", item.name, true)) +
          row("遊戲商標識符", input("code", item.code, true)) +
          row("遊戲商類型", input("type", "遊戲通道", true)) +
          row("代理ID", input("agentId", item.agentId, true)) +
          row("代理名稱", input("agent", item.agent, true)) +
          row("遊戲商接入狀態", input("enabled", statusText, true)) +
          row("顯示排序", input("sort", item.sort, true)) +
          row("通道商戶狀態", input("channel", statusText, true)) +
          row("備注", input("remark", item.remark, true)) +
          row("創建時間", input("createdAt", item.createdAt, true)) +
          row("更新時間", input("updatedAt", item.updatedAt, true)) + '</div>';
      } else {
        modalBodyEl.innerHTML = '<form class="form-rows" id="accessForm">' +
          row("ID", input("integrationId", item.integrationId, true)) +
          row("遊戲商類型", '<select name="vendorType"><option value="遊戲通道">遊戲通道</option></select>') +
          row("遊戲商名稱", '<select name="name"><option>' + escapeHtml(item.name) + '</option>' + accessRows.filter((row) => row.name !== item.name).map((row) => '<option>' + escapeHtml(row.name) + '</option>').join("") + '</select>') +
          row("遊戲商標識符", input("code", item.code)) +
          row("遊戲商ID", input("vendorId", item.id)) +
          row("代理名稱", '<select name="agent"><option>System</option></select>') +
          row("遊戲商接入狀態", '<label class="switch"><input type="checkbox" name="enabled" ' + (item.enabled ? 'checked' : '') + '><span></span></label>') +
          row("顯示排序", input("sort", item.sort)) +
          row("備注", '<textarea name="remark">' + escapeHtml(item.remark === '-' ? '' : item.remark) + '</textarea>') +
          row("創建時間", input("createdAt", item.createdAt, true)) +
          row("更新時間", input("updatedAt", item.updatedAt, true)) + '</form>';
      }
      modalEl.classList.add("is-open"); modalBackdropEl.classList.add("is-open"); modalEl.setAttribute("aria-hidden", "false");
    }
    function closeModal() {
      const draftIndex = accessRows.findIndex((row) => row.integrationId === currentId && row.draft);
      if (draftIndex !== -1) {
        accessRows.splice(draftIndex, 1);
        applyFilters();
      }
      modalEl.classList.remove("is-open");
      modalBackdropEl.classList.remove("is-open");
      modalEl.setAttribute("aria-hidden", "true");
    }
    function saveForm(form) {
      const item = accessRows.find((row) => row.integrationId === currentId);
      if (!item) return;
      item.name = form.elements.name.value;
      item.code = form.elements.code.value.trim() || item.code;
      item.id = form.elements.vendorId.value.trim() || item.id;
      item.agent = form.elements.agent.value;
      item.enabled = form.elements.enabled.checked;
      item.sort = Number(form.elements.sort.value) || 0;
      item.remark = form.elements.remark.value.trim() || '-';
      item.updatedAt = new Date().toISOString().slice(0, 19).replace('T', ' ');
      delete item.draft;
      applyFilters(); closeModal(); showToast("遊戲商接入已保存");
    }
    filterPanel.addEventListener("submit", (event) => { event.preventDefault(); applyFilters(); });
    document.getElementById("toggleFilters").addEventListener("click", (event) => { filterPanel.hidden = !filterPanel.hidden; event.currentTarget.setAttribute("aria-expanded", String(!filterPanel.hidden)); });
    document.getElementById("refreshButton").addEventListener("click", () => { applyFilters(); showToast("資料已刷新"); });
    document.getElementById("columnSettings").addEventListener("click", () => showToast("列設定已套用"));
    document.getElementById("createButton").addEventListener("click", () => { const item = accessRows[0]; const copy = { ...item, integrationId: 'new' + Date.now().toString(16), name: '新增遊戲商', code: '', id: '', sort: 0, draft: true, createdAt: new Date().toISOString().slice(0, 19).replace('T', ' '), updatedAt: new Date().toISOString().slice(0, 19).replace('T', ' ') }; accessRows.unshift(copy); applyFilters(); openModal(copy.integrationId, "edit"); });
    modeSwitchEl.addEventListener("click", () => openModal(currentId, currentMode === "view" ? "edit" : "view"));
    document.getElementById("resetModal").addEventListener("click", () => openModal(currentId, "edit"));
    modalBackdropEl.addEventListener("click", closeModal);
    modalBodyEl.addEventListener("submit", (event) => { event.preventDefault(); if (event.target.id === "accessForm") saveForm(event.target); });
    document.body.addEventListener("click", async (event) => {
      const view = event.target.closest("[data-view]"); if (view) { openModal(view.dataset.view, "view"); return; }
      const edit = event.target.closest("[data-edit]"); if (edit) { openModal(edit.dataset.edit, "edit"); return; }
      if (event.target.closest("[data-close-modal]")) closeModal();
      const copy = event.target.closest("[data-copy]"); if (copy) { try { await navigator.clipboard.writeText(copy.dataset.copy); showToast("已複製"); } catch { showToast("複製失敗", "warning"); } return; }
      const coming = event.target.closest("[data-coming-soon]"); if (coming) showToast(coming.dataset.comingSoon + " 尚未建立頁面", "warning");
    });
    document.body.addEventListener("change", (event) => {
      const status = event.target.closest("[data-status]");
      if (!status) return;
      const item = accessRows.find((row) => row.integrationId === status.dataset.status);
      if (item) { item.enabled = status.checked; item.updatedAt = new Date().toISOString().slice(0, 19).replace('T', ' '); showToast(item.name + (item.enabled ? " 已啟用" : " 已停用")); }
    });
    window.addEventListener("keydown", (event) => { if (event.key === "Escape") closeModal(); });
    function setupSidebarInteractions() {
      const menuToggleEl = document.querySelector(".menu-toggle");
      const sidebarEl = document.querySelector(".sidebar");
      const shellEl = document.querySelector(".app-shell");
      if (!menuToggleEl || !sidebarEl || !shellEl) return;
      const desktopQuery = window.matchMedia("(min-width: 821px)");
      function getMenuChevron(button) {
        const candidates = Array.from(button.children).filter((child) => !child.classList.contains("menu-label") && !child.classList.contains("menu-badge"));
        return candidates[candidates.length - 1] || null;
      }
      function setMenuExpanded(button, submenu, expanded) {
        submenu.hidden = !expanded;
        button.setAttribute("aria-expanded", String(expanded));
        const chevron = getMenuChevron(button);
        if (chevron) chevron.textContent = expanded ? "⌃" : "⌄";
      }
      sidebarEl.querySelectorAll(".sidebar-menu > .menu-item").forEach((button, index) => {
        const submenu = button.nextElementSibling && button.nextElementSibling.classList.contains("submenu") ? button.nextElementSibling : null;
        if (!submenu) {
          button.removeAttribute("aria-expanded");
          button.classList.add("is-empty");
          const chevron = getMenuChevron(button);
          if (chevron) chevron.textContent = "";
          button.addEventListener("click", () => showToast("此分類尚未建立子選單", "warning"));
          return;
        }
        if (!submenu.id) submenu.id = "sidebar-submenu-" + index;
        button.setAttribute("aria-controls", submenu.id);
        setMenuExpanded(button, submenu, Boolean(submenu.querySelector(".submenu-item.active")));
        button.addEventListener("click", () => setMenuExpanded(button, submenu, button.getAttribute("aria-expanded") !== "true"));
      });
      function setSidebarExpanded(expanded) {
        shellEl.classList.toggle("sidebar-collapsed", !expanded);
        sidebarEl.classList.remove("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", String(expanded));
      }
      function syncToggleState() {
        if (desktopQuery.matches) menuToggleEl.setAttribute("aria-expanded", String(!shellEl.classList.contains("sidebar-collapsed")));
        else {
          shellEl.classList.remove("sidebar-collapsed");
          menuToggleEl.setAttribute("aria-expanded", String(sidebarEl.classList.contains("is-mobile-open")));
        }
      }
      menuToggleEl.addEventListener("click", () => {
        if (desktopQuery.matches) {
          setSidebarExpanded(shellEl.classList.contains("sidebar-collapsed"));
          return;
        }
        const isOpen = sidebarEl.classList.toggle("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", String(isOpen));
      });
      sidebarEl.addEventListener("click", (event) => {
        const link = event.target.closest("a.submenu-item");
        if (!link || desktopQuery.matches) return;
        sidebarEl.classList.remove("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", "false");
      });
      if (desktopQuery.addEventListener) desktopQuery.addEventListener("change", syncToggleState);
      else desktopQuery.addListener(syncToggleState);
      syncToggleState();
    }
    fillOptions();
    setupSidebarInteractions();
    applyFilters();
