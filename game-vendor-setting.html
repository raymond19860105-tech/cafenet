    let filteredVendors = [...vendors];
    let modalId = null;
    const vendorRowsEl = document.getElementById("vendorRows");
    const filterForm = document.getElementById("filterForm");
    const vendorFilter = document.getElementById("vendorFilter");
    const aggregatorFilter = document.getElementById("aggregatorFilter");
    const modalEl = document.getElementById("vendorModal");
    const modalBackdropEl = document.getElementById("modalBackdrop");
    const modalBodyEl = document.getElementById("modalBody");
    function escapeHtml(value) { return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function showToast(message, tone = "success") { const toast = document.getElementById("toast"); toast.textContent = message; toast.style.background = tone === "warning" ? "#92400e" : "#1f2937"; toast.classList.add("is-open"); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toast.classList.remove("is-open"), 1800); }
    function unique(values) { return [...new Set(values.filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), "zh-Hant")); }
    function fillOptions() {
      unique(vendors.map((item) => item.name)).forEach((name) => vendorFilter.insertAdjacentHTML("beforeend", '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>'));
      unique(vendors.flatMap((item) => item.configs.map((config) => config.name))).forEach((name) => aggregatorFilter.insertAdjacentHTML("beforeend", '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>'));
    }
    function configMarkup(configs) { return '<div class="config-list">' + configs.map((config) => '<span class="config-pill ' + escapeHtml(config.tone) + '">' + escapeHtml(config.name) + ' ' + escapeHtml(config.rate) + '%</span>').join("") + '</div>'; }
    function typeMarkup(type) { return '<span class="type-tag ' + (type.includes("真人") ? "live" : "") + '">' + escapeHtml(type) + '</span>'; }
    function copyMarkup(text) { return '<span class="copy-line"><button class="copy-button" type="button" data-copy="' + escapeHtml(text) + '" aria-label="複製"></button><span>' + escapeHtml(text) + '</span></span>'; }
    function identityMarkup(vendor) { return '<div class="identity-stack"><span class="identity-name">' + escapeHtml(vendor.name) + '</span>' + copyMarkup(vendor.id) + '</div>'; }
    function stateMarkup(vendor) { return '<div class="state-stack"><label class="switch"><input type="checkbox" data-status="' + escapeHtml(vendor.id) + '" ' + (vendor.enabled ? 'checked' : '') + '><span></span></label>' + typeMarkup(vendor.type) + '</div>'; }
    function renderRows() {
      vendorRowsEl.innerHTML = filteredVendors.map((vendor, index) => '<tr class="' + (index === 0 ? 'is-selected' : '') + '">' +
        '<td>' + identityMarkup(vendor) + '</td>' +
        '<td>' + configMarkup(vendor.configs) + '</td>' +
        '<td><span class="vendor-code">' + copyMarkup(vendor.code) + '</span></td>' +
        '<td>' + stateMarkup(vendor) + '</td>' +
        '<td><span class="inline-save"><input class="sort-input" type="number" min="0" value="' + escapeHtml(vendor.sort) + '" data-sort="' + escapeHtml(vendor.id) + '"><button class="button" type="button" data-save-sort="' + escapeHtml(vendor.id) + '">保存</button></span></td>' +
        '<td>' + timeMarkup(vendor.createdAt, vendor.updatedAt) + '</td>' +
        '<td><button class="button" type="button" data-edit="' + escapeHtml(vendor.id) + '">編輯</button></td></tr>').join("");
    }
    function timeMarkup(createdAt, updatedAt) { return '<div class="time-stack"><span><span class="time-label">建</span>' + escapeHtml(createdAt) + '</span><span><span class="time-label">更</span>' + escapeHtml(updatedAt) + '</span></div>'; }
    function applyFilters() {
      const vendor = vendorFilter.value;
      const aggregator = aggregatorFilter.value;
      filteredVendors = vendors.filter((item) => (!vendor || item.name === vendor) && (!aggregator || item.configs.some((config) => config.name === aggregator)));
      renderRows();
    }
    function openModal(id) {
      const vendor = vendors.find((item) => item.id === id);
      if (!vendor) return;
      modalId = id;
      modalBodyEl.innerHTML = '<form class="form-rows" id="vendorEditForm">' +
        row("ID", '<input class="readonly" name="id" value="' + escapeHtml(vendor.id) + '" readonly>') +
        row("遊戲商名稱", '<input name="name" value="' + escapeHtml(vendor.name) + '">') +
        row("遊戲商標識符", '<input name="code" value="' + escapeHtml(vendor.code) + '">') +
        row("類型", '<select name="type"><option' + (vendor.type === "電子遊戲" ? " selected" : "") + '>電子遊戲</option><option' + (vendor.type === "真人遊戲" ? " selected" : "") + '>真人遊戲</option></select>') +
        row("狀態", '<label class="switch"><input name="enabled" type="checkbox" ' + (vendor.enabled ? 'checked' : '') + '><span></span></label>') +
        row("種類排序", '<input name="sort" type="number" min="0" value="' + escapeHtml(vendor.sort) + '">') +
        row("集成商配置", '<textarea name="configs">' + escapeHtml(vendor.configs.map((config) => config.name + ' ' + config.rate + '%').join(', ')) + '</textarea>') + '</form>';
      modalEl.classList.add("is-open"); modalBackdropEl.classList.add("is-open"); modalEl.setAttribute("aria-hidden", "false");
    }
    function row(label, control) { return '<div class="form-row"><label>' + label + '</label>' + control + '</div>'; }
    function closeModal() { modalEl.classList.remove("is-open"); modalBackdropEl.classList.remove("is-open"); modalEl.setAttribute("aria-hidden", "true"); }
    function saveModal(form) {
      const vendor = vendors.find((item) => item.id === modalId);
      if (!vendor) return;
      vendor.name = form.elements.name.value.trim() || vendor.name;
      vendor.code = form.elements.code.value.trim() || vendor.code;
      vendor.type = form.elements.type.value;
      vendor.enabled = form.elements.enabled.checked;
      vendor.sort = Number(form.elements.sort.value) || 0;
      vendor.updatedAt = new Date().toISOString().slice(0, 19).replace('T', ' ');
      applyFilters(); closeModal(); showToast("遊戲商設定已保存");
    }
    filterForm.addEventListener("submit", (event) => { event.preventDefault(); applyFilters(); });
    document.getElementById("resetFilters").addEventListener("click", () => { filterForm.reset(); applyFilters(); });
    document.getElementById("columnSettings").addEventListener("click", () => showToast("列設定已套用"));
    document.getElementById("resetModal").addEventListener("click", () => modalId && openModal(modalId));
    modalBackdropEl.addEventListener("click", closeModal);
    document.body.addEventListener("click", async (event) => {
      const copy = event.target.closest("[data-copy]");
      if (copy) { try { await navigator.clipboard.writeText(copy.dataset.copy); showToast("已複製"); } catch { showToast("複製失敗", "warning"); } return; }
      const edit = event.target.closest("[data-edit]");
      if (edit) { openModal(edit.dataset.edit); return; }
      const saveSort = event.target.closest("[data-save-sort]");
      if (saveSort) { const vendor = vendors.find((item) => item.id === saveSort.dataset.saveSort); const input = document.querySelector('[data-sort="' + CSS.escape(saveSort.dataset.saveSort) + '"]'); if (vendor && input) { vendor.sort = Number(input.value) || 0; vendor.updatedAt = new Date().toISOString().slice(0, 19).replace('T', ' '); showToast("排序已保存"); renderRows(); } return; }
      if (event.target.closest("[data-close-modal]")) closeModal();
      const coming = event.target.closest("[data-coming-soon]");
      if (coming) showToast(coming.dataset.comingSoon + " 尚未建立頁面", "warning");
    });
    document.body.addEventListener("change", (event) => {
      const status = event.target.closest("[data-status]");
      if (!status) return;
      const vendor = vendors.find((item) => item.id === status.dataset.status);
      if (vendor) { vendor.enabled = status.checked; vendor.updatedAt = new Date().toISOString().slice(0, 19).replace('T', ' '); showToast(vendor.name + (vendor.enabled ? " 已啟用" : " 已停用")); }
    });
    modalBodyEl.addEventListener("submit", (event) => { event.preventDefault(); if (event.target.id === "vendorEditForm") saveModal(event.target); });
    window.addEventListener("keydown", (event) => { if (event.key === "Escape") closeModal(); });
    function setupSidebarInteractions() {
      const menuToggleEl = document.querySelector(".menu-toggle");
      const sidebarEl = document.querySelector(".sidebar");
      const shellEl = document.querySelector(".app-shell");
      if (!menuToggleEl || !sidebarEl || !shellEl) return;
      const desktopQuery = window.matchMedia("(min-width: 821px)");
      function getMenuChevron(button) {
        const candidates = Array.from(button.children).filter((child) => !child.classList.contains("menu-label") && !child.classList.contains("menu-badge"));
        return candidates[candidates.length - 1] || null;
      }
      function setMenuExpanded(button, submenu, expanded) {
        submenu.hidden = !expanded;
        button.setAttribute("aria-expanded", String(expanded));
        const chevron = getMenuChevron(button);
        if (chevron) chevron.textContent = expanded ? "⌃" : "⌄";
      }
      sidebarEl.querySelectorAll(".sidebar-menu > .menu-item").forEach((button, index) => {
        const submenu = button.nextElementSibling && button.nextElementSibling.classList.contains("submenu") ? button.nextElementSibling : null;
        if (!submenu) {
          button.removeAttribute("aria-expanded");
          button.classList.add("is-empty");
          const chevron = getMenuChevron(button);
          if (chevron) chevron.textContent = "";
          button.addEventListener("click", () => showToast("此分類尚未建立子選單", "warning"));
          return;
        }
        if (!submenu.id) submenu.id = "sidebar-submenu-" + index;
        button.setAttribute("aria-controls", submenu.id);
        setMenuExpanded(button, submenu, Boolean(submenu.querySelector(".submenu-item.active")));
        button.addEventListener("click", () => setMenuExpanded(button, submenu, button.getAttribute("aria-expanded") !== "true"));
      });
      function setSidebarExpanded(expanded) {
        shellEl.classList.toggle("sidebar-collapsed", !expanded);
        sidebarEl.classList.remove("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", String(expanded));
      }
      function syncToggleState() {
        if (desktopQuery.matches) menuToggleEl.setAttribute("aria-expanded", String(!shellEl.classList.contains("sidebar-collapsed")));
        else {
          shellEl.classList.remove("sidebar-collapsed");
          menuToggleEl.setAttribute("aria-expanded", String(sidebarEl.classList.contains("is-mobile-open")));
        }
      }
      menuToggleEl.addEventListener("click", () => {
        if (desktopQuery.matches) {
          setSidebarExpanded(shellEl.classList.contains("sidebar-collapsed"));
          return;
        }
        const isOpen = sidebarEl.classList.toggle("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", String(isOpen));
      });
      sidebarEl.addEventListener("click", (event) => {
        const link = event.target.closest("a.submenu-item");
        if (!link || desktopQuery.matches) return;
        sidebarEl.classList.remove("is-mobile-open");
        menuToggleEl.setAttribute("aria-expanded", "false");
      });
      if (desktopQuery.addEventListener) desktopQuery.addEventListener("change", syncToggleState);
      else desktopQuery.addListener(syncToggleState);
      syncToggleState();
    }
    fillOptions();
    setupSidebarInteractions();
    applyFilters();
  </script>
